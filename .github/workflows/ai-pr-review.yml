name: AI Multi-Agent PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git diff origin/main...HEAD -- . \
            ':(exclude).github/' \
            ':(exclude)*.json' \
            | head -n 150 > /tmp/pr_diff.txt
          echo "diff_ready=true" >> $GITHUB_OUTPUT

