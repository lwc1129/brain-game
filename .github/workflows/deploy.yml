name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # 注意：絕不把 GEMINI_API_KEY 注入前端。AI 出題一律經由後端 proxy
      # （見 proxy/），這裡只注入 proxy 網址與 GA ID 這類可公開的設定。
      - name: Inject runtime config
        env:
          GA_MEASUREMENT_ID: ${{ secrets.GA_MEASUREMENT_ID }}
          AI_PROXY_URL: ${{ vars.AI_PROXY_URL }}
        run: |
          sed -i "s|GA_MEASUREMENT_ID: ''|GA_MEASUREMENT_ID: '${GA_MEASUREMENT_ID}'|" js/config.js
          sed -i "s|AI_PROXY_URL: ''|AI_PROXY_URL: '${AI_PROXY_URL}'|" js/config.js

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - uses: actions/deploy-pages@v4
        id: deployment
